# Local development with bind mounts (no Docker image build).
# Usage: docker compose -f docker-compose.dev.yml up
#
# MinIO only (S3-compatible storage): docker compose -f docker-compose.minio.yml up -d
#
# First run installs deps inside the container; subsequent starts are faster.

services:
  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command:
      - sh
      - -c
      - >
        corepack enable &&
        corepack prepare pnpm@10.6.5 --activate &&
        pnpm install --frozen-lockfile &&
        pnpm --filter @sploy/web dev
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    depends_on:
      - api

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    command:
      - sh
      - -c
      - >
        corepack enable &&
        corepack prepare pnpm@10.6.5 --activate &&
        pnpm install --frozen-lockfile &&
        pnpm --filter @sploy/api dev
    environment:
      NODE_ENV: development
      PORT: "8080"
      CORS_ORIGIN: "http://localhost:3000"
      # From host: use localhost. From another container, use service name: minio:9000
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: sploy
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:9000/sploy
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - sploy-minio-data:/data

volumes:
  sploy-minio-data:
