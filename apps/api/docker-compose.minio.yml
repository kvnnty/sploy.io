# Local S3-compatible storage (MinIO). Use when you are not running the full dev stack.
#
#   docker compose -f docker-compose.minio.yml up -d
#
# Console: http://localhost:9001  (minioadmin / minioadmin)
# S3 API:  http://localhost:9000
#
# Point apps/api `.env` at the values in `.env.example` (MINIO_*).

services:
  minio:
    image: minio/minio:latest
    container_name: sploy-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: miniopassword
    volumes:
      - sploy-minio-data:/data

volumes:
  sploy-minio-data:
