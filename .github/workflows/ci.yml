# Continuous integration: lint and build all packages via Turborepo.
# Extend with test jobs, matrix Node versions, or path filters when you add them.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      # Next.js reads these at build time; replace with GitHub Secrets when you wire real values.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /auth/login
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
